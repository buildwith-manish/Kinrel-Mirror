<svg xmlns="http://www.w3.org/2000/svg" width="120" height="130" viewBox="0 0 120 130" fill="none">
  <title>Kinrel Logo — Stacked Dark</title>
  <desc>Kinrel stacked vertical logo lockup for dark backgrounds. K-graph icon on top, KINREL wordmark below.</desc>

  <defs>
    <radialGradient id="rbg-sd" cx="35%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#23263E"/>
      <stop offset="100%" stop-color="#191B2C"/>
    </radialGradient>
    <linearGradient id="grad-sd" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#E8612A"/>
      <stop offset="100%" stop-color="#F59240"/>
    </linearGradient>
    <clipPath id="clip-sd">
      <rect x="28" width="64" height="64" rx="14" ry="14"/>
    </clipPath>
  </defs>

  <!-- Icon background centred -->
  <rect x="28" y="0" width="64" height="64" rx="14" ry="14" fill="url(#rbg-sd)"/>

  <!-- Orbit ring -->
  <circle cx="60" cy="32" r="24" stroke="#E8612A" stroke-width="0.5" stroke-opacity="0.18" stroke-dasharray="4 6" fill="none"/>

  <g clip-path="url(#clip-sd)">
    <line x1="45.9" y1="14.1" x2="45.9" y2="32"   stroke="#E8612A" stroke-width="1.0" stroke-opacity="0.75" stroke-linecap="round"/>
    <line x1="45.9" y1="32"   x2="45.9" y2="49.9" stroke="#E8612A" stroke-width="1.0" stroke-opacity="0.75" stroke-linecap="round"/>
    <line x1="45.9" y1="32"   x2="60"   y2="21.8" stroke="#F59240" stroke-width="0.9" stroke-opacity="0.75" stroke-linecap="round"/>
    <line x1="60"   y1="21.8" x2="72.8" y2="10.9" stroke="#F59240" stroke-width="0.9" stroke-opacity="0.75" stroke-linecap="round"/>
    <line x1="45.9" y1="32"   x2="60"   y2="42.2" stroke="#C44A18" stroke-width="0.9" stroke-opacity="0.75" stroke-linecap="round"/>
    <line x1="60"   y1="42.2" x2="72.8" y2="53.1" stroke="#C44A18" stroke-width="0.9" stroke-opacity="0.75" stroke-linecap="round"/>
    <line x1="60" y1="21.8" x2="60" y2="42.2" stroke="#E8612A" stroke-width="0.5" stroke-opacity="0.35" stroke-dasharray="2,2" stroke-linecap="round"/>
    <line x1="45.9" y1="14.1" x2="60" y2="21.8" stroke="#F59240" stroke-width="0.45" stroke-opacity="0.35" stroke-dasharray="1.3,2.6" stroke-linecap="round"/>
    <line x1="45.9" y1="49.9" x2="60" y2="42.2" stroke="#C44A18" stroke-width="0.45" stroke-opacity="0.35" stroke-dasharray="1.3,2.6" stroke-linecap="round"/>

    <circle cx="45.9" cy="14.1" r="2.9" fill="#E8612A"/>
    <circle cx="45.9" cy="32"   r="3.8" fill="#E8612A"/>
    <circle cx="45.9" cy="49.9" r="2.9" fill="#E8612A"/>
    <circle cx="72.8" cy="10.9" r="2.6" fill="#F59240"/>
    <circle cx="72.8" cy="53.1" r="2.6" fill="#F59240"/>
    <circle cx="60"   cy="21.8" r="1.9" fill="#C44A18"/>
    <circle cx="60"   cy="42.2" r="1.9" fill="#C44A18"/>

    <circle cx="45.2" cy="13.4" r="1.0" fill="white" fill-opacity="0.38"/>
    <circle cx="44.9" cy="31.0" r="1.3" fill="white" fill-opacity="0.38"/>
    <circle cx="45.2" cy="49.2" r="1.0" fill="white" fill-opacity="0.38"/>

    <circle cx="45.9" cy="32" r="5.8" stroke="url(#grad-sd)" stroke-width="0.8" fill="none" stroke-opacity="0.55"/>
  </g>

  <!-- Wordmark below icon -->
  <text x="60" y="92"
    font-family="'Outfit', 'DM Sans', system-ui, sans-serif"
    font-size="22" font-weight="800"
    letter-spacing="4"
    text-anchor="middle"
    fill="#F5F0EE">KINREL</text>

  <text x="60" y="108"
    font-family="'DM Sans', system-ui, sans-serif"
    font-size="9" font-weight="400"
    letter-spacing="3.5"
    text-anchor="middle"
    fill="#C9B4A8">by Daxelo</text>
</svg>
