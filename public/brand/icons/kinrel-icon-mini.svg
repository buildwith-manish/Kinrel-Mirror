<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" fill="none">
  <title>Kinrel Icon — Mini</title>
  <desc>Kinrel simplified K icon for 16–24px use. Three thick lines forming a bold K shape on dark background. Replaces the full 7-node graph which becomes unreadable below 24px.</desc>

  <!-- Background -->
  <rect width="100" height="100" rx="22" ry="22" fill="#191B2C"/>

  <!-- Bold K shape: vertical spine + upper arm + lower arm -->
  <line x1="32" y1="18" x2="32" y2="82" stroke="#E8612A" stroke-width="11" stroke-linecap="round"/>
  <line x1="32" y1="50" x2="74" y2="18" stroke="#E8612A" stroke-width="9"  stroke-linecap="round"/>
  <line x1="32" y1="50" x2="74" y2="82" stroke="#E8612A" stroke-width="9"  stroke-linecap="round"/>
</svg>
